server {
  listen 3443 ssl;
  error_page 497 =301 https://$host:3443$request_uri;
  server_name crm.central-service.ru;
  resolver 127.0.0.11 ipv6=off valid=10s;

  ssl_certificate     /etc/letsencrypt/live/crm.central-service.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/crm.central-service.ru/privkey.pem;

  location / {
    set $ui_shell_upstream http://ui-shell:3000;
    proxy_pass $ui_shell_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /api/ {
    set $gateway_upstream http://gateway:8000;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass $gateway_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
  }

  location /auth/ {
    set $keycloak_upstream http://keycloak:8080;
    rewrite ^/auth/(.*)$ /$1 break;
    proxy_pass $keycloak_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
  }

  # Keycloak login pages reference absolute paths (/resources, /realms).
  # Route them back to Keycloak so auth pages keep their styles/scripts.
  location /resources/ {
    set $keycloak_resources_upstream http://keycloak:8080;
    proxy_pass $keycloak_resources_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
  }

  location /realms/ {
    set $keycloak_realms_upstream http://keycloak:8080;
    proxy_pass $keycloak_realms_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
  }
}
